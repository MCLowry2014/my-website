services:
  - type: web
    name: my-website
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: watchlist-data
      mountPath: /var/data
      sizeGB: 1
